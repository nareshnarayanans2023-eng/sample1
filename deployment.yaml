apiVersion: apps/v1
kind: Deployment
metadata:
  name: rivera-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rivera
  template:
    metadata:
      labels:
        app: rivera
    spec:
      containers:
      - name: rivera-container
        image: rivera-app:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: rivera-service
spec:
  type: NodePort
  selector:
    app: rivera
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30001 
